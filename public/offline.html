<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e6fb0" />
    <title>Offline — MedConnect</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --surface: #ffffff;
        --border: #dbe5f0;
        --text: #1e293b;
        --muted: #64748b;
        --primary: #1e6fb0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #eef6ff 0%, var(--bg) 55%);
        color: var(--text);
      }
      .card {
        width: min(100%, 30rem);
        border: 1px solid var(--border);
        border-radius: 1.25rem;
        background: var(--surface);
        padding: 1.5rem;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      }
      .logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 3rem;
        height: 3rem;
        border-radius: 0.875rem;
        background: var(--primary);
        color: #fff;
        font-size: 1.5rem;
        font-weight: 700;
      }
      h1 { margin: 1rem 0 0.5rem; font-size: 1.5rem; }
      p { margin: 0; color: var(--muted); line-height: 1.6; }
      a {
        display: inline-flex;
        margin-top: 1.25rem;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        background: var(--primary);
        color: #fff;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">+</div>
      <h1>You are offline</h1>
      <p>MedConnect can still open some recently visited pages, but live doctor search, sign-in, and consultation updates need an internet connection.</p>
      <a href="/">Try again</a>
    </div>
  </body>
</html>
