name = "medconnect-chat-do"
main = "worker/chat-do.ts"
compatibility_date = "2025-03-28"
compatibility_flags = ["nodejs_compat"]

# This worker only exists to host the ChatRoom Durable Object.
# The main medconnect worker binds to it via script_name.

[[kv_namespaces]]
binding = "SESSIONS"
id = "b2fab377ec7047c6948f84f6fd581489"

[[d1_databases]]
binding = "DB"
database_name = "medconnect-db"
database_id = "17121db9-4084-4b9c-9636-517dfa945ea8"

[durable_objects]
bindings = [
  { name = "CHAT_ROOMS", class_name = "ChatRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]
